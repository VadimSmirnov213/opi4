app.name=lab3
app.version=1.0.0
app.jar.name=lab3.jar
app.alt.jar.name=lab3-alt.jar
main.class=org.example.Main

project.encoding=UTF-8
project.root=.
gradle.wrapper=gradlew
gradle.build.dir.rel=build
gradle.classes.dir.rel=build/classes/java/main
gradle.resources.dir.rel=build/resources/main
gradle.javadoc.dir.rel=build/docs/javadoc

src.dir.rel=src/main/java
resources.dir.rel=src/main/resources
test.src.dir.rel=src/test/java
i18n.dir.rel=src/main/resources/i18n
i18n.includes=**/*.properties

ant.work.dir.rel=ant-build
classes.dir.rel=ant-build/classes
dist.dir.rel=ant-build/dist
manifest.file.rel=ant-build/MANIFEST.MF
docs.dir.rel=ant-build/docs
javadoc.dir.rel=ant-build/docs/javadoc
checksums.dir.rel=ant-build/checksums
native.copy.dir.rel=ant-build/native2ascii/input
native.out.dir.rel=ant-build/native2ascii/output
alt.workspace.dir.rel=ant-build/alt-workspace
team.workspace.dir.rel=ant-build/team-workspace

dist.jar.rel=ant-build/dist/lab3.jar
native.encoding=UTF-8

music.command=if command -v paplay >/dev/null 2>&1; then paplay /usr/share/sounds/freedesktop/stereo/complete.oga; elif command -v aplay >/dev/null 2>&1; then aplay /usr/share/sounds/alsa/Front_Center.wav; else printf '\\a'; fi

history.script=tools/ant-history.sh
history.diff.file=ant-build/history-last-failed.diff

team.script=tools/ant-team.sh
team.revisions=3
team.zip.file=ant-build/team-builds.zip
ant.bin=tools/apache-ant/apache-ant-1.10.17/bin/ant
svn.bootstrap.script=tools/ant-svn-bootstrap.sh
local.svn.repo.rel=ant-build/local-svn/repo
local.svn.wc.rel=ant-build/local-svn/wc

alt.replace.includes=src/main/java/**/*.java
alt.copy.includes=build.xml build.properties build.gradle settings.gradle gradlew gradlew.bat gradle/** src/main/** src/test/** src/main/resources/** src/main/webapp/**
alt.rename.class.from=PointService
alt.rename.class.to=PointServiceAlt
alt.rename.variable.match=pointRequestDto
alt.rename.variable.replace=pointRequestDtoAlt
alt.rename.regex.pattern=pointRequestDtoAlt
alt.rename.regex.replace=pointRequestDtoAltRegex
